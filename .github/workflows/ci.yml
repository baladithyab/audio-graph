# AudioGraph CI — Tauri v2 desktop app
# Frontend checks + Rust backend checks per platform
#
# The Tauri backend depends on the rsac crate via `path = "../../../"` —
# a relative path that assumes audio-graph is a subdirectory of the parent
# rsac repo (which is the normal dev layout). When audio-graph is checked
# out standalone in its own CI, that path doesn't exist, so we clone the
# parent repo into the expected relative location before any `cargo`
# commands run.

name: AudioGraph CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pin the parent repo ref so CI is reproducible. Use `master` for bleeding
  # edge; bump to a tag (e.g. `v0.1.0`) once we're cutting releases.
  RSAC_REPO_URL: https://github.com/Codeseys-Labs/rust-crossplat-audio-capture.git
  RSAC_REPO_REF: master

jobs:
  # ── Frontend (fast, platform-independent) ──────────────────────────
  frontend:
    name: Frontend (TypeScript)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run tsc --noEmit
      - name: Vitest
        run: bun run test
      - name: Production build
        run: bun run build

  # ── Rust backend — Linux ───────────────────────────────────────────
  rust-linux:
    name: Rust (Linux)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          path: rsac/apps/audio-graph

      - name: Fetch rsac parent (for path dep)
        # Cargo.toml uses `rsac = { path = "../../../" }` — stage the parent
        # repo at the expected relative location so the path dep resolves.
        run: |
          cd "$GITHUB_WORKSPACE/rsac"
          # Move all parent repo files into the rsac/ dir without clobbering
          # the existing apps/audio-graph/ subtree.
          git clone --depth 1 --branch "$RSAC_REPO_REF" "$RSAC_REPO_URL" /tmp/rsac-parent
          shopt -s dotglob
          for f in /tmp/rsac-parent/*; do
            name=$(basename "$f")
            if [ "$name" = "apps" ]; then
              # Don't clobber our checked-out apps/audio-graph — copy peers only.
              mkdir -p apps
              if [ -d "$f" ]; then
                for sub in "$f"/*; do
                  sn=$(basename "$sub")
                  [ "$sn" = "audio-graph" ] && continue
                  cp -R "$sub" "apps/"
                done
              fi
            else
              cp -R "$f" "./"
            fi
          done

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rsac/apps/audio-graph/src-tauri

      - name: Install system dependencies
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y \
            libpipewire-0.3-dev libspa-0.2-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev cmake clang libclang-dev pkg-config

      - name: Format check
        working-directory: rsac/apps/audio-graph/src-tauri
        run: cargo fmt --check

      - name: Cargo check
        working-directory: rsac/apps/audio-graph/src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: rsac/apps/audio-graph/src-tauri
        run: cargo test -- --test-threads=1

      - name: Cargo audit
        # Hard gate: advisories are either ignored in `.cargo/audit.toml`
        # (with written justification) or must be resolved. Fail on any new
        # finding — that forces a real review rather than silent drift.
        working-directory: rsac/apps/audio-graph/src-tauri
        run: |
          cargo install --locked cargo-audit || true
          cargo audit

  # ── Rust backend — macOS ───────────────────────────────────────────
  rust-macos:
    name: Rust (macOS)
    runs-on: blacksmith-6vcpu-macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          path: rsac/apps/audio-graph

      - name: Fetch rsac parent (for path dep)
        run: |
          cd "$GITHUB_WORKSPACE/rsac"
          git clone --depth 1 --branch "$RSAC_REPO_REF" "$RSAC_REPO_URL" /tmp/rsac-parent
          shopt -s dotglob
          for f in /tmp/rsac-parent/*; do
            name=$(basename "$f")
            if [ "$name" = "apps" ]; then
              mkdir -p apps
              if [ -d "$f" ]; then
                for sub in "$f"/*; do
                  sn=$(basename "$sub")
                  [ "$sn" = "audio-graph" ] && continue
                  cp -R "$sub" "apps/"
                done
              fi
            else
              cp -R "$f" "./"
            fi
          done

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rsac/apps/audio-graph/src-tauri

      - name: Install system dependencies
        run: brew install cmake

      - name: Cargo check
        working-directory: rsac/apps/audio-graph/src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: rsac/apps/audio-graph/src-tauri
        run: cargo test -- --test-threads=1

  # ── Rust backend — Windows ─────────────────────────────────────────
  rust-windows:
    name: Rust (Windows)
    runs-on: blacksmith-4vcpu-windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          path: rsac/apps/audio-graph

      - name: Fetch rsac parent (for path dep)
        shell: pwsh
        run: |
          Set-Location "$env:GITHUB_WORKSPACE\rsac"
          git clone --depth 1 --branch $env:RSAC_REPO_REF $env:RSAC_REPO_URL "$env:TEMP\rsac-parent"
          # Copy parent files to rsac/ without clobbering apps/audio-graph.
          Get-ChildItem "$env:TEMP\rsac-parent" -Force | ForEach-Object {
            if ($_.Name -eq 'apps') {
              New-Item -ItemType Directory -Force -Path 'apps' | Out-Null
              Get-ChildItem $_.FullName -Force | ForEach-Object {
                if ($_.Name -ne 'audio-graph') {
                  Copy-Item $_.FullName -Destination 'apps\' -Recurse -Force
                }
              }
            } else {
              Copy-Item $_.FullName -Destination '.\' -Recurse -Force
            }
          }

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rsac/apps/audio-graph/src-tauri
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install system dependencies
        run: choco install cmake llvm -y

      - name: Cargo check
        working-directory: rsac/apps/audio-graph/src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: rsac/apps/audio-graph/src-tauri
        run: cargo test -- --test-threads=1
