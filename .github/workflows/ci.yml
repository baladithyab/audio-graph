# AudioGraph CI — Tauri v2 desktop app
# Frontend checks + Rust backend checks per platform
#
# The Tauri backend depends on the rsac crate via `path = "../../../"` —
# a relative path that assumes audio-graph is a subdirectory of the parent
# rsac repo (which is the normal dev layout). When audio-graph is checked
# out standalone in its own CI, that path doesn't exist, so we clone the
# parent repo into the expected relative location before any `cargo`
# commands run.

name: AudioGraph CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pin the parent repo ref so CI is reproducible. Use `master` for bleeding
  # edge; bump to a tag (e.g. `v0.1.0`) once we're cutting releases.
  RSAC_REPO_URL: https://github.com/Codeseys-Labs/rust-crossplat-audio-capture.git
  RSAC_REPO_REF: master

jobs:
  # ── Frontend (fast, platform-independent) ──────────────────────────
  frontend:
    name: Frontend (TypeScript)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run tsc --noEmit
      - name: Vitest
        run: bun run test
      - name: Production build
        run: bun run build

  # ── Rust backend — Linux ───────────────────────────────────────────
  rust-linux:
    name: Rust (Linux)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # Check out audio-graph at the default location. The rsac parent repo
    # is fetched separately in the "Fetch rsac parent" step below.
    steps:
      - uses: actions/checkout@v4
        with:
          path: audio-graph
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: audio-graph/src-tauri

      - name: Fetch rsac parent (for path dep)
        # The Cargo.toml uses `rsac = { path = "../../../" }` — stage the
        # repos so audio-graph lives at `rsac/apps/audio-graph/`, matching
        # the dev checkout layout.
        run: |
          git clone --depth 1 --branch "$RSAC_REPO_REF" "$RSAC_REPO_URL" rsac
          mkdir -p rsac/apps
          mv audio-graph rsac/apps/audio-graph
          echo "WORKDIR=$GITHUB_WORKSPACE/rsac/apps/audio-graph" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y \
            libpipewire-0.3-dev libspa-0.2-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev cmake clang libclang-dev pkg-config

      - name: Format check
        working-directory: ${{ env.WORKDIR }}/src-tauri
        run: cargo fmt --check

      - name: Cargo check
        working-directory: ${{ env.WORKDIR }}/src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: ${{ env.WORKDIR }}/src-tauri
        run: cargo test -- --test-threads=1

      - name: Cargo audit
        # Informational: surfaces advisories but does not fail CI yet. Promote
        # to hard gate once the existing advisory backlog is cleaned up.
        continue-on-error: true
        working-directory: ${{ env.WORKDIR }}/src-tauri
        run: |
          cargo install --locked cargo-audit || true
          cargo audit

  # ── Rust backend — macOS ───────────────────────────────────────────
  rust-macos:
    name: Rust (macOS)
    runs-on: blacksmith-6vcpu-macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          path: audio-graph
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: audio-graph/src-tauri

      - name: Fetch rsac parent (for path dep)
        run: |
          git clone --depth 1 --branch "$RSAC_REPO_REF" "$RSAC_REPO_URL" rsac
          mkdir -p rsac/apps
          mv audio-graph rsac/apps/audio-graph
          echo "WORKDIR=$GITHUB_WORKSPACE/rsac/apps/audio-graph" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: brew install cmake

      - name: Cargo check
        working-directory: ${{ env.WORKDIR }}/src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: ${{ env.WORKDIR }}/src-tauri
        run: cargo test -- --test-threads=1

  # ── Rust backend — Windows ─────────────────────────────────────────
  rust-windows:
    name: Rust (Windows)
    runs-on: blacksmith-4vcpu-windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          path: audio-graph
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: audio-graph/src-tauri
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Fetch rsac parent (for path dep)
        shell: pwsh
        run: |
          git clone --depth 1 --branch $env:RSAC_REPO_REF $env:RSAC_REPO_URL rsac
          New-Item -ItemType Directory -Force -Path rsac\apps | Out-Null
          Move-Item -Path audio-graph -Destination rsac\apps\audio-graph
          "WORKDIR=$env:GITHUB_WORKSPACE\rsac\apps\audio-graph" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install system dependencies
        run: choco install cmake llvm -y

      - name: Cargo check
        working-directory: ${{ env.WORKDIR }}\src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: ${{ env.WORKDIR }}\src-tauri
        run: cargo test -- --test-threads=1
