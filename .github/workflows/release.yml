# Tag-triggered release build.
#
# Trigger: pushing a git tag matching `v*` (e.g. `v0.2.0`, `v1.0.0-rc.1`).
# Produces: macOS DMG, Windows MSI+NSIS, Linux AppImage+deb, all attached
# to a GitHub Release draft.
#
# Signing is optional. If the `APPLE_*` and `WINDOWS_*` secrets are set,
# tauri-action will sign + notarize. If not, unsigned artifacts ship and
# users will see Gatekeeper / SmartScreen warnings — fine for early
# previews, blocks Gatekeeper/Defender once we have real users.
#
# Same rsac-parent-staging dance as ci.yml — audio-graph's Cargo.toml has
# `rsac = { path = "../../../" }` so the parent repo must be available
# at the expected relative location before any cargo command runs.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build without publishing a release"
        required: false
        default: "false"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RSAC_REPO_URL: https://github.com/Codeseys-Labs/rust-crossplat-audio-capture.git
  RSAC_REPO_REF: master

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v5

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            # Manual dispatch: use the latest tag on master, or a synthetic one.
            tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0-dev")
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft GitHub Release
        id: create
        if: ${{ github.event_name == 'push' || github.event.inputs.dry_run != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: "${{ steps.tag.outputs.tag }}",
              name: "AudioGraph ${{ steps.tag.outputs.tag }}",
              body: "Automated release. See CHANGELOG.md for details.",
              draft: true,
              prerelease: false,
            });
            return data.id;
          result-encoding: string

  build:
    name: Build (${{ matrix.platform }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout audio-graph
        uses: actions/checkout@v5
        with:
          path: rsac/apps/audio-graph

      - name: Fetch rsac parent (for path dep)
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE/rsac"
          git clone --depth 1 --branch "$RSAC_REPO_REF" "$RSAC_REPO_URL" /tmp/rsac-parent
          shopt -s dotglob
          for f in /tmp/rsac-parent/*; do
            name=$(basename "$f")
            if [ "$name" = "apps" ]; then
              mkdir -p apps
              if [ -d "$f" ]; then
                for sub in "$f"/*; do
                  sn=$(basename "$sub")
                  [ "$sn" = "audio-graph" ] && continue
                  cp -R "$sub" "apps/"
                done
              fi
            else
              cp -R "$f" "./"
            fi
          done

      - name: Install universal target (macOS)
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y \
            libpipewire-0.3-dev libspa-0.2-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev cmake clang libclang-dev pkg-config \
            libssl-dev build-essential

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: rsac/apps/audio-graph
        run: bun install --frozen-lockfile

      - name: Build + release via tauri-action
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Apple code signing + notarization (optional) ──────────
          # Set all 6 to enable. Missing any → skip signing (unsigned DMG).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ── Windows Authenticode (optional) ────────────────────────
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          # ── Tauri updater signing (optional, separate from OS signing) ──
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: rsac/apps/audio-graph
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
